<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TruthLens</title>
  <style>
    :root {
      --bg: #121417;
      --bg-elevated: #171a1f;
      --surface: #1b1f25;
      --surface-strong: #20252d;
      --surface-soft: #161a20;
      --border: #2b313b;
      --border-strong: #39414d;
      --text: #eef2f7;
      --muted: #98a2af;
      --accent: #d6dde7;
      --accent-strong: #ffffff;
      --danger: #e4a4a8;
      --danger-soft: #3b2629;
      --shadow: 0 12px 28px rgba(0, 0, 0, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 388px;
      margin: 0;
      padding: 0;
      color: var(--text);
      font-family: Aptos, "Segoe UI Variable", "Segoe UI", sans-serif;
      background: var(--bg);
    }

    .shell {
      position: relative;
      min-height: 100vh;
      padding: 16px;
      border: 1px solid var(--border);
      border-radius: 0;
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .toolbar {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 2;
    }

    .icon-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 38px;
      height: 38px;
      padding: 0;
      border: 1px solid var(--border);
      border-radius: 0;
      background: var(--surface-strong);
      color: var(--danger);
      cursor: pointer;
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
      box-shadow: none;
    }

    .icon-button:hover {
      background: var(--danger-soft);
      border-color: #5a3439;
    }

    .icon-button svg {
      width: 17px;
      height: 17px;
    }

    .hero {
      position: relative;
      padding-right: 48px;
      margin-bottom: 18px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .brand-logo {
      flex: 0 0 auto;
      width: 42px;
      height: 42px;
      padding: 4px;
      border: 1px solid var(--border);
      background: #14181d;
      object-fit: contain;
    }

    .brand-copy {
      min-width: 0;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
      padding: 5px 8px;
      border: 1px solid var(--border);
      border-radius: 0;
      background: var(--surface-soft);
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 7px;
      height: 7px;
      background: var(--accent);
    }

    h3 {
      margin: 0;
      font-size: 24px;
      line-height: 1;
      letter-spacing: -0.03em;
      font-weight: 700;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .panel {
      position: relative;
      z-index: 1;
      margin-bottom: 12px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 0;
      background: var(--surface-strong);
    }

    .panel-label {
      display: block;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .mode-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 8px;
    }

    select {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 0;
      background: #14181d;
      color: var(--text);
      font: inherit;
      outline: none;
      box-shadow: none;
    }

    select:focus {
      border-color: var(--border-strong);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    button {
      position: relative;
      overflow: hidden;
      min-height: 52px;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 0;
      font: inherit;
      font-weight: 700;
      letter-spacing: -0.01em;
      cursor: pointer;
      transition: background 120ms ease, border-color 120ms ease, opacity 120ms ease;
    }

    button:hover {
      opacity: 0.96;
    }

    .primary-btn {
      color: var(--accent-strong);
      background: #272e37;
      border-color: #39414d;
      box-shadow: none;
    }

    .secondary-btn {
      color: var(--text);
      background: #1a1f26;
      border-color: var(--border);
      box-shadow: none;
    }

    .btn-title {
      display: block;
      margin-bottom: 2px;
      font-size: 14px;
    }

    .btn-subtitle {
      display: block;
      color: inherit;
      opacity: 0.68;
      font-size: 11px;
      font-weight: 500;
      line-height: 1.35;
    }

    #status {
      min-height: 38px;
      margin-bottom: 12px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 0;
      background: var(--surface-soft);
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    #status:empty {
      display: none;
    }

    #results {
      max-height: 340px;
      overflow-y: auto;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 0;
      background: var(--bg-elevated);
      box-shadow: none;
    }

    #results p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .result-item {
      margin-bottom: 12px;
      padding: 14px;
      border: 1px solid var(--border);
      border-left: 3px solid;
      border-radius: 0;
      background: var(--surface);
      box-shadow: none;
    }

    .result-item:last-child {
      margin-bottom: 0;
    }

    .true {
      border-left-color: #60c08a;
    }

    .false {
      border-left-color: #d27074;
    }

    .uncertain {
      border-left-color: #d4c07d;
    }

    .label {
      font-weight: 700;
      color: var(--text);
    }

    .source-list {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .source-list a {
      color: #cbd6e2;
      text-decoration: none;
      font-weight: 700;
    }

    .source-list a:hover {
      text-decoration: underline;
    }

    .debug-box {
      margin-top: 14px;
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 0;
      background: #181c22;
    }

    .debug-box h4 {
      margin: 0 0 8px;
      font-size: 14px;
      letter-spacing: 0.01em;
    }

    .debug-box p {
      margin: 6px 0;
      font-size: 12px;
      line-height: 1.45;
      color: #b0bac7;
    }

    .debug-box ul {
      margin: 8px 0 0 18px;
      padding: 0;
    }

    .debug-box li {
      margin: 4px 0;
      font-size: 12px;
      color: #b0bac7;
    }

    .muted {
      color: var(--muted);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="toolbar">
      <button id="clearCacheBtn" class="icon-button" title="Vider le cache" aria-label="Vider le cache">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 6h18"></path>
          <path d="M8 6V4.8c0-.44.36-.8.8-.8h6.4c.44 0 .8.36.8.8V6"></path>
          <path d="M6.8 6l.8 12.1c.03.5.45.89.95.89h7.9c.5 0 .92-.39.95-.89L19.2 6"></path>
          <path d="M10 10.2v5.6"></path>
          <path d="M14 10.2v5.6"></path>
        </svg>
        <span class="sr-only">Vider le cache</span>
      </button>
    </div>

    <div class="hero">
      <div class="eyebrow">Verification IA</div>
      <div class="brand-row">
        <img src="img.png" alt="Logo TruthLens" class="brand-logo">
        <div class="brand-copy">
          <h3>TruthLens</h3>
          <p class="subtitle">Analyse une page ou une sélection, compare les affirmations avec des sources fiables et affiche un verdict lisible.</p>
        </div>
      </div>
    </div>

    <div class="panel mode-row">
      <label for="analysisMode" class="panel-label">Mode d'analyse</label>
      <select id="analysisMode">
        <option value="quick">Analyse rapide</option>
        <option value="deep">Analyse approfondie</option>
      </select>
    </div>

    <div class="actions">
      <button id="verifyPageBtn" class="primary-btn">
        <span class="btn-title">Analyser la page</span>
        <span class="btn-subtitle">Article, post X, page d’info</span>
      </button>
      <button id="verifySelectionBtn" class="secondary-btn">
        <span class="btn-title">Analyser la sélection</span>
        <span class="btn-subtitle">Vérification ciblée d’un extrait</span>
      </button>
    </div>

    <div id="status"></div>
    <div id="results"></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
